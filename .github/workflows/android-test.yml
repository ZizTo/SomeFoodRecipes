name: Android CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Make Gradle executable
        run: chmod +x ./gradlew
      
      - name: Build and Run Unit Tests
        run: ./gradlew :app:testDebugUnitTest
      
      - name: Setup Android environment
        run: |
          mkdir -p /home/runner/.android/avd/
          touch /home/runner/.android/repositories.cfg
          echo "Android environment setup completed"
      
      - name: Start Android Emulator and Run Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2.24.
