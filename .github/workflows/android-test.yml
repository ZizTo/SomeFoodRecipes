name: Android CI (Kotlin 2.0.21)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9477386
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('/*.gradle*', '/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-30

      - name: Create AVD
        if: steps.avd-cache.outputs.cache-hit != 'true'
        run: |
          echo "y" | sdkmanager --install "system-images;android-30;google_apis;x86"
          echo "no" | avdmanager create avd -n test_avd -k "system-images;android-30;google_apis;x86" --force

      - name: Start emulator
        run: |
            echo "Starting emulator..."
            $ANDROID_HOME/emulator/emulator -avd test_avd -no-audio -no-window -no-snapshot -gpu swiftshader_indirect &
            adb wait-for-device
            adb shell input keyevent 82  # разблокировать экран


      - name: Build and run test
        run: ./gradlew clean build testDebugUnitTest connectedAndroidTest
