name: Android CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Make Gradle executable
        run: chmod +x ./gradlew
      
      - name: Build and Run Unit Tests
        run: ./gradlew :app:testDebugUnitTest
      
      - name: Run instrumented tests with emulator
        uses: reactivecircus/android-emulator-runner@v2.24.0
        with:
          api-level: 28
          target: default
          arch: x86_64
          profile: Nexus 5
          emulator-options: -no-snapshot-save -no-window -noaudio -no-boot-anim -cores 2
          script: |
            # Wait for emulator to fully boot
            echo "Waiting for emulator to boot..."
            timeout 300 adb wait-for-device
            echo "Device connected, waiting for boot completion..."
            timeout 300 adb shell getprop sys.boot_completed | grep -q "1"
            echo "Emulator booted, running tests..."
            ./gradlew :app:connectedDebugAndroidTest
