name: Android CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Make Gradle executable
        run: chmod +x ./gradlew
      
      - name: Build and Run Unit Tests
        run: ./gradlew :app:testDebugUnitTest
      
      - name: Create AVD directory
        run: mkdir -p /home/runner/.android/avd/
      
      - name: Start Android Emulator and Run Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2.24.0
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_3a
          cores: 2
          ram-size: 2048M
          heap-size: 512M
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -noaudio -no-boot-anim -gpu swiftshader_indirect
          script: ./gradlew :app:connectedDebugAndroidTest
